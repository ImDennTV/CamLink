<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#0a0a0f">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CamLink">
<link rel="manifest" href="/manifest.webmanifest">
<link rel="icon" href="/icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="/icon.svg">
<link rel="stylesheet" href="/styles.css">
<title>CamLink</title>
</head>
<body>

<video id="v" autoplay muted playsinline></video>
<div id="scrim-grad"></div>

<!-- ── Schermata iniziale ─────────────────────────────────────────── -->
<section id="idle">
  <div class="brand">
    <div class="logo">
      <svg viewBox="0 0 24 24" class="icon"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
    </div>
    <h1>CamLink</h1>
    <p>Il tuo telefono diventa una webcam.<br>Nitida, fluida, senza lag.</p>
  </div>

  <button id="btnStart" class="cta">
    <svg viewBox="0 0 24 24" class="icon"><polygon points="6 4 20 12 6 20 6 4"/></svg>
    <span id="ctaLabel">Avvia</span>
  </button>

  <p id="err" class="err"></p>
  <p class="foothint">Assicurati che la Virtual Camera di OBS sia attiva sul PC</p>
</section>

<!-- ── HUD live ────────────────────────────────────────────────────── -->
<header id="top">
  <div id="pill"><span id="qdot"></span><span id="pillTxt">Connessione…</span></div>
</header>

<nav id="dock">
  <button class="dockbtn" id="btnFlip" aria-label="Cambia camera">
    <svg viewBox="0 0 24 24" class="icon"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10"/><path d="M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
  </button>
  <button class="dockbtn" id="btnTorch" aria-label="Torcia" hidden>
    <svg viewBox="0 0 24 24" class="icon"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
  </button>
  <button class="dockbtn" id="btnRefresh" aria-label="Riavvia streaming">
    <svg viewBox="0 0 24 24" class="icon"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
  </button>
  <button class="dockbtn" id="btnSettings" aria-label="Impostazioni">
    <svg viewBox="0 0 24 24" class="icon"><line x1="4" y1="21" x2="4" y2="14"/><line x1="4" y1="10" x2="4" y2="3"/><line x1="12" y1="21" x2="12" y2="12"/><line x1="12" y1="8" x2="12" y2="3"/><line x1="20" y1="21" x2="20" y2="16"/><line x1="20" y1="12" x2="20" y2="3"/><line x1="1" y1="14" x2="7" y2="14"/><line x1="9" y1="8" x2="15" y2="8"/><line x1="17" y1="16" x2="23" y2="16"/></svg>
  </button>
</nav>

<!-- ── Pannello impostazioni ───────────────────────────────────────── -->
<div id="scrim"></div>
<section id="sheet" aria-label="Impostazioni">
  <div class="grab"></div>
  <h2>Impostazioni</h2>

  <p class="label">Qualità</p>
  <div class="seg" id="seg">
    <button data-q="1080p30">1080·30</button>
    <button data-q="720p60" class="active">720·60</button>
    <button data-q="720p30">720·30</button>
  </div>

  <div class="slider" id="zoomRow" hidden>
    <svg viewBox="0 0 24 24" class="icon"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.7" y2="16.7"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
    <input id="zoom" type="range" min="1" max="5" step="0.1" value="1">
  </div>

  <div class="rows">
    <div class="row">
      <div class="rl">
        <svg viewBox="0 0 24 24" class="icon"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
        <span>Specchia immagine</span>
      </div>
      <label class="sw"><input id="swMirror" type="checkbox"><span></span></label>
    </div>
    <div class="row">
      <div class="rl">
        <svg viewBox="0 0 24 24" class="icon"><path d="M3 3v18h18"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/></svg>
        <span>Statistiche</span>
      </div>
      <label class="sw"><input id="swStats" type="checkbox" checked><span></span></label>
    </div>
  </div>

  <button class="stop" id="btnStop">
    <svg viewBox="0 0 24 24" class="icon"><rect x="5" y="5" width="14" height="14" rx="2"/></svg>
    Ferma streaming
  </button>
</section>

<script src="/app.js"></script>
</body>
</html>
